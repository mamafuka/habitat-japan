<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8E4DE"/>
      <stop offset="50%" stop-color="#D4CFC6"/>
      <stop offset="100%" stop-color="#C4BFB6"/>
    </linearGradient>
    <linearGradient id="light" x1="400" y1="0" x2="400" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FAF8F5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FAF8F5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="700" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A2332" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A2332" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#light)"/>
  <rect y="680" width="800" height="320" fill="url(#floor)"/>
  <!-- Window frame -->
  <rect x="120" y="120" width="360" height="480" rx="4" fill="#FAF8F5" fill-opacity="0.3" stroke="#C4A962" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="300" y1="120" x2="300" y2="600" stroke="#C4A962" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="120" y1="360" x2="480" y2="360" stroke="#C4A962" stroke-width="1" stroke-opacity="0.3"/>
  <!-- City silhouette -->
  <rect x="140" y="280" width="40" height="200" fill="#1A2332" fill-opacity="0.12" rx="2"/>
  <rect x="200" y="220" width="55" height="260" fill="#1A2332" fill-opacity="0.15" rx="2"/>
  <rect x="270" y="300" width="35" height="180" fill="#1A2332" fill-opacity="0.1" rx="2"/>
  <rect x="320" y="250" width="50" height="230" fill="#1A2332" fill-opacity="0.13" rx="2"/>
  <rect x="390" y="310" width="30" height="170" fill="#1A2332" fill-opacity="0.08" rx="2"/>
  <!-- Sofa -->
  <rect x="80" y="720" width="320" height="100" rx="12" fill="#1A2332" fill-opacity="0.7"/>
  <rect x="60" y="700" width="80" height="120" rx="16" fill="#1A2332" fill-opacity="0.6"/>
  <rect x="340" y="700" width="80" height="120" rx="16" fill="#1A2332" fill-opacity="0.6"/>
  <!-- Coffee table -->
  <rect x="200" y="800" width="160" height="12" rx="4" fill="#C4A962" fill-opacity="0.5"/>
  <rect x="230" y="812" width="8" height="60" fill="#2C2C2C" fill-opacity="0.3"/>
  <rect x="322" y="812" width="8" height="60" fill="#2C2C2C" fill-opacity="0.3"/>
  <!-- Plant -->
  <ellipse cx="620" cy="780" rx="50" ry="20" fill="#1A2332" fill-opacity="0.2"/>
  <rect x="605" y="700" width="30" height="90" fill="#5A5A5A" fill-opacity="0.3" rx="4"/>
  <ellipse cx="620" cy="680" rx="60" ry="50" fill="#1A2332" fill-opacity="0.15"/>
  <ellipse cx="600" cy="660" rx="35" ry="30" fill="#1A2332" fill-opacity="0.12"/>
  <ellipse cx="645" cy="665" rx="30" ry="25" fill="#1A2332" fill-opacity="0.1"/>
  <!-- Floor lamp -->
  <line x1="700" y1="500" x2="700" y2="820" stroke="#C4A962" stroke-width="2" stroke-opacity="0.4"/>
  <ellipse cx="700" cy="490" rx="40" ry="15" fill="#FAF8F5" fill-opacity="0.4" stroke="#C4A962" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Art frame -->
  <rect x="540" y="180" width="180" height="220" rx="2" fill="none" stroke="#C4A962" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="560" y="200" width="140" height="180" fill="#1A2332" fill-opacity="0.06"/>
  <line x1="580" y1="320" x2="680" y2="240" stroke="#C4A962" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="580" y1="260" x2="660" y2="360" stroke="#C4A962" stroke-width="1" stroke-opacity="0.15"/>
</svg>
